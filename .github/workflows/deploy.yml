name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy built files to root
        run: |
          # Copy built index.html to root (overwrites source version for serving)
          cp dist/index.html index.html
          cp dist/index.html 404.html
          rm -f assets/*.js assets/*.css
          cp dist/assets/* assets/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/
          git diff --staged --quiet && exit 0
          git commit -m "build: update deployed assets [skip ci]"
          git push
